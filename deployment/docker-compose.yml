version: '3.8'

services:
  # Power Systems Autoencoder Service (Stage 1)
  power-autoencoder:
    build:
      context: ../
      dockerfile: deployment/services/power-autoencoder/Dockerfile
    volumes:
      - ./models:/app/models:ro
      - ./config:/app/config:ro
      - ./logs:/app/logs
    environment:
      - MODEL_PATH=/app/models/power_autoencoder.pt
      - THRESHOLD_PERCENTILE=75
      - INPUT_DIM=196
      - HIDDEN_DIM=256
      - LATENT_DIM=64
      - POWER_SYSTEMS_MODE=true
      - GRID_AWARE_TRAINING=true
      - SUBSTATION_ID=${SUBSTATION_ID:-SUB001}
    restart: unless-stopped
    ports:
      - "8083:8083"
    networks:
      - power-grid-network

networks:
  power-grid-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
